apiVersion: v1
kind: Namespace
metadata:
  name: solution-based-monitoring-ignore-2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: failing-deployment
  namespace: solution-based-monitoring-ignore-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: failing-app
  template:
    metadata:
      labels:
        app: failing-app
    spec:
      containers:
        - name: failing-container
          image: busybox
          command: ["sh", "-c", "exit 1"]
          readinessProbe:
            exec:
              command: ["false"]
            initialDelaySeconds: 2
            failureThreshold: 0
            periodSeconds: 5
